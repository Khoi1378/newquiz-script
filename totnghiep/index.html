<script>

const TOKEN_KEYS = ["tk_token_v2","tk_token_v1","tk_token"];
const TOKEN_COOKIES = ["tk_token_v2","tk_token_v1","tk_token"];
const ME_KEY = "tk_me_v2";
const PAGE_PATH = "/totnghiep";

const content = document.getElementById("content");

function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = String(msg || "");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1400);

function escapeHtml(s){
  return String(s ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function getCookie(name){
  const cs = document.cookie ? document.cookie.split(";") : [];
  let found = "";
  for(const raw of cs){
    const s = raw.trim();
    if(!s) continue;
    const eq = s.indexOf("=");
    const k = (eq >= 0 ? s.slice(0,eq) : s).trim();
    if(k === name) found = eq >= 0 ? s.slice(eq + 1) : "";
  }
  try{return found ? decodeURIComponent(found) : ""}
  catch{return found || ""}
}

function getToken(){
  let t = "";

  for(const k of TOKEN_KEYS){
    try{
      t = (localStorage.getItem(k) || "").trim();
      if(t) break;
    }catch{}
  }

  if(!t){
    for(const k of TOKEN_KEYS){
      try{
        t = (sessionStorage.getItem(k) || "").trim();
        if(t) break;
      }catch{}
    }
  }

  if(!t){
    for(const c of TOKEN_COOKIES){
      t = (getCookie(c) || "").trim();
      if(t) break;
    }
  }

  if(!t){
    const wn = String(window.name || "");
    if(wn.startsWith("tk:")) t = wn.slice(3).trim();
  }

  try{
    const u = new URL(location.href);
    if(!t){
      const q = (u.searchParams.get("tk") || u.searchParams.get("token") || "").trim();
      if(q) t = q;
    }
    if(!t && u.hash){
      const hs = u.hash.replace(/^#/,"");
      const p = new URLSearchParams(hs);
      const q2 = (p.get("tk") || p.get("token") || "").trim();
      if(q2) t = q2;
    }
  }catch{}

  return t;
}

function getMeCache(){
  try{
    const raw = localStorage.getItem(ME_KEY);
    if(!raw) return null;
    const obj = JSON.parse(raw);
    if(obj && obj.username) return obj;
  }catch{}
  return null;
}

function setMeCache(me){
  try{
    if(!me) localStorage.removeItem(ME_KEY);
    else localStorage.setItem(ME_KEY, JSON.stringify(me));
  }catch{}
}

function sbHeaders(){
  return {
    "apikey": SUPABASE_ANON_KEY,
    "Authorization": "Bearer " + SUPABASE_ANON_KEY,
    "Content-Type": "application/json",
    "Accept": "application/json"
  };
}

async function rpc(fn,args){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
    method: "POST",
    headers: sbHeaders(),
    body: JSON.stringify(args || {})
  });

  const txt = await res.text();
  let data = null;

  try{data = txt ? JSON.parse(txt) : null}catch{}

  if(!res.ok){
    const msg = data && (data.message || data.error || data.hint)
      ? (data.message || data.error || data.hint)
      : txt;
    throw new Error(msg || `RPC failed: ${fn}`);
  }

  return data;
}

async function rpcTry(fns,argsList){
  let lastErr = null;
  const list = Array.isArray(fns) ? fns : [fns];
  const aList = Array.isArray(argsList) && argsList.length ? argsList : [{}];

  for(const fn of list){
    for(const args of aList){
      try{
        return await rpc(fn,args || {});
      }catch(e){
        lastErr = e;
      }
    }
  }

  throw lastErr || new Error("RPC failed");
}

function firstObj(x){
  if(Array.isArray(x)) return x[0] || null;
  if(x && typeof x === "object") return x;
  return null;
}

function pickMe(out){
  const o = firstObj(out) || {};
  let me = o.me || o.user || o.profile || o.data || null;

  if(Array.isArray(me)) me = me[0] || null;

  if(me && typeof me === "object"){
    return {
      username: me.username || me.name || me.user || me.handle || "",
      role: me.role || me.user_role || me.userRole || "user"
    };
  }

  if(o.username){
    return {
      username: o.username,
      role: o.role || "user"
    };
  }

  return null;
}

function asOk(out){
  const o = firstObj(out) || {};
  if(typeof o.ok === "boolean") return o.ok;
  if(pickMe(out)) return true;
  return false;
}

async function apiMe(token){
  const t = String(token || "").trim();
  const out = await rpcTry(
    ["api_me","me","app_me","api_whoami","api_profile","whoami"],
    [
      {p_token:t},
      {token:t},
      {p_session:t},
      {session:t},
      {session_token:t},
      {p_session_token:t}
    ]
  );

  return {
    ok: asOk(out),
    me: pickMe(out)
  };
}

async function apiLoadProgress(token){
  return await rpc("api_totnghiep_get", {
    p_token: token
  });

async function apiSaveProgress(token,data){
  return await rpc("api_totnghiep_save", {
    p_token: token,
    p_data: data
  });
}

function updateUserUI(){

    statusPill.textContent = "Chưa đăng nhập";
    userCorner.style.display = "none";
    return;
  }

  statusPill.innerHTML = `Xin chào <b>${escapeHtml(ME.username)}</b>`;

  userCorner.style.display = "inline-flex";
}

function rawValue(id){
  const el = document.getElementById(id);
  return el ? el.value.trim() : "";
}

function smartNumber(raw, required){
  let s = String(raw ?? "").trim().replace(",", ".");

  if(!s){
    if(required){
      return {ok:false, empty:true, value:null, text:"Chưa nhập"};
    }
    return {ok:true, empty:true, value:0, text:""};
  }

  if(/^\d{2}$/.test(s) && s !== "10"){
    s = s[0] + "." + s[1];
  }

  if(!/^\d+(\.\d+)?$/.test(s)){
    return {ok:false, empty:false, value:null, text:"Điểm không hợp lệ"};
  }

  const n = Number(s);

  if(!Number.isFinite(n)){
    return {ok:false, empty:false, value:null, text:"Điểm không hợp lệ"};
  }

  if(n < 0 || n > 10){
    return {ok:false, empty:false, value:null, text:"Điểm phải từ 0 đến 10"};
  }

  return {ok:true, empty:false, value:n, text:""};
}

function round2(n){
  return Math.round((Number(n) + Number.EPSILON) * 100) / 100;
}

function fmt(n){
  if(!Number.isFinite(Number(n))) return "—";
  return round2(n).toFixed(2);
}

function setFieldError(id, hasError){
  const el = document.getElementById(id);
  if(el) el.classList.toggle("error", !!hasError);
}

function collectRawData(){
  return {
    math: rawValue("math"),
    literature: rawValue("literature"),
    elective1: rawValue("elective1"),
    elective2: rawValue("elective2"),
    grade10: rawValue("grade10"),
    grade11: rawValue("grade11"),
    grade12: rawValue("grade12"),
    bonus: rawValue("bonus"),
    priority: rawValue("priority")
  };
}

function validateAndCalc(showErrors){
  const idsRequired = [
    "math",
    "literature",
    "elective1",
    "elective2",
    "grade10",
    "grade11",
    "grade12"
  ];

  const parsed = {};
  let ok = true;
  let firstError = "";

  for(const id of idsRequired){
    const p = smartNumber(rawValue(id), true);
    parsed[id] = p.value;
    if(!p.ok){
      ok = false;
      if(!firstError) firstError = `${fieldName(id)}: ${p.text}`;
    }
    if(showErrors) setFieldError(id,!p.ok);
  }

  for(const id of ["bonus","priority"]){
    const p = smartNumber(rawValue(id), false);
    parsed[id] = p.value;
    if(!p.ok){
      ok = false;
      if(!firstError) firstError = `${fieldName(id)}: ${p.text}`;
    }
    if(showErrors) setFieldError(id,!p.ok);
  }

  if(!ok){
    return {
      ok:false,
      error:firstError || "Vui lòng kiểm tra lại điểm."
    };
  }

  const examScores = [
    parsed.math,
    parsed.literature,
    parsed.elective1,
    parsed.elective2
  ];

  const hasDeadScore = examScores.some(x => Number(x) <= 1);

  const examAvg = round2((parsed.math + parsed.literature + parsed.elective1 + parsed.elective2) / 4);
  const schoolAvg = round2((parsed.grade10 + parsed.grade11 + parsed.grade12) / 3);

  const graduationScore = round2(
    examAvg * 0.5 +
    schoolAvg * 0.5 +
    parsed.priority +
    parsed.bonus
  );

  const passByScore = graduationScore >= 5;
  const pass = passByScore && !hasDeadScore;

  return {
    ok:true,
    parsed,
    examAvg,
    schoolAvg,
    graduationScore,
    hasDeadScore,
    passByScore,
    pass
  };
}

function fieldName(id){
  const map = {
    math:"Toán",
    literature:"Văn",
    elective1:"Tự chọn 1",
    elective2:"Tự chọn 2",
    grade10:"Điểm TB lớp 10",
    grade11:"Điểm TB lớp 11",
    grade12:"Điểm TB lớp 12",
    bonus:"Điểm khuyến khích",
    priority:"Điểm ưu tiên"
  };
  return map[id] || id;
}

function renderResult(){
  const box = document.getElementById("resultBox");
  const calc = validateAndCalc(true);

  if(!box) return;

  if(!calc.ok){
    box.className = "resultBox show resultWarn";
    box.innerHTML = `
      <div class="row1">
        <p class="vi">Chưa thể tính</p>
        <span class="idx badge-warn">THIẾU / SAI DỮ LIỆU</span>
      </div>
      <div class="muted" style="margin-top:8px">${escapeHtml(calc.error)}</div>
    `;
    toast(calc.error);
    return;
  }

  const badge = calc.pass
    ? `<span class="idx badge-ok">ĐẬU TỐT NGHIỆP</span>`
    : `<span class="idx badge-bad">CHƯA ĐẬU</span>`;

  const cls = calc.pass ? "resultOk" : "resultBad";

  let note = "";

  if(calc.hasDeadScore){
    note = `Có môn thi đạt ≤ 1.0 điểm nên bị tính là điểm liệt. Dù ĐXTN là ${fmt(calc.graduationScore)}, vẫn chưa đủ điều kiện công nhận tốt nghiệp.`;
  }else if(calc.graduationScore >= 5){
    note = "Điểm xét tốt nghiệp từ 5.00 trở lên và không có điểm liệt.";
  }else{
    note = "Điểm xét tốt nghiệp dưới 5.00.";
  }

  box.className = `resultBox show ${cls}`;
  box.innerHTML = `
    <div class="row1">
      <p class="vi">Điểm xét tốt nghiệp của bạn là</p>
      ${badge}
    </div>

    <div class="resultScore">${fmt(calc.graduationScore)}</div>

    <div class="muted" style="line-height:1.45">
      ${escapeHtml(note)}
    </div>

    <div style="height:1px;background:#e5e7eb;margin:12px 0"></div>

    <div class="grid2">
      <div class="formula">
        <b>Điểm thi:</b> ${fmt(calc.examAvg)}<br>
        Trung bình 4 môn thi.
      </div>
      <div class="formula">
        <b>ĐTB 3 năm:</b> ${fmt(calc.schoolAvg)}<br>
        Trung bình lớp 10, 11, 12.
      </div>
    </div>
  `;
}

function scheduleSave(){
  const state = document.getElementById("saveState");
  if(state) state.textContent = "Đang chờ lưu…";

  clearTimeout(SAVE_TIMER);
  SAVE_TIMER = setTimeout(saveNow, 450);
}

async function saveNow(){
  const state = document.getElementById("saveState");
  const data = collectRawData();
  data.savedAtClient = new Date().toISOString();

  const json = JSON.stringify(data);

  if(json === LAST_SAVE_JSON){
    if(state) state.textContent = "Đã lưu";
    return;
  }

  LAST_SAVE_JSON = json;

  try{
    if(state) state.textContent = "Đang lưu…";
    const out = await apiSaveProgress(TOKEN,data);

    if(!out || out.ok === false){
      throw new Error(out && out.error ? out.error : "save_failed");
    }

    if(state) state.textContent = "Đã lưu";
  }catch(e){
    if(state) state.textContent = "Lưu lỗi";
    console.warn(e);
  }
}

function setInputValues(data){
  const ids = [
    "math",
    "literature",
    "elective1",
    "elective2",
    "grade10",
    "grade11",
    "grade12",
    "bonus",
    "priority"
  ];

  for(const id of ids){
    const el = document.getElementById(id);
    if(el && data && data[id] != null){
      el.value = String(data[id]);
    }
  }
}

function normalizeInputOnBlur(e){
  const el = e.target;
  const required = !["bonus","priority"].includes(el.id);
  const p = smartNumber(el.value, required);

  if(p.ok && !p.empty){
    el.value = String(p.value);
  }

  scheduleSave();
}

function bindInputs(){
  const inputs = document.querySelectorAll(".scoreInput");

  inputs.forEach(el => {
    el.addEventListener("input", () => {
      el.value = el.value.replace(",", ".");
      setFieldError(el.id,false);
      scheduleSave();
    });

    el.addEventListener("blur", normalizeInputOnBlur);

    el.addEventListener("keydown", e => {
      if(e.key === "Enter"){
        e.preventDefault();
        renderResult();
      }
    });
  });

  const btn = document.getElementById("btnCalc");
  if(btn) btn.onclick = () => {
    saveNow();
    renderResult();
  };

  window.addEventListener("beforeunload", () => {
    const data = collectRawData();
    try{
      navigator.sendBeacon;
    }catch{}
  });
}

async function boot(){
  TOKEN = getToken();
  ME = getMeCache();
  updateUserUI();

  if(!TOKEN){
    redirectLogin();
    return;
  }

  try{
    const meOut = await apiMe(TOKEN);

    if(!meOut || !meOut.ok || !meOut.me || !meOut.me.username){
      redirectLogin();
      return;
    }

    ME = meOut.me;
    setMeCache(ME);
    updateUserUI();

    const progress = await apiLoadProgress(TOKEN);

    if(!progress || progress.ok === false){
      redirectLogin();
      return;
    }

    LOADED_DATA = progress.data || {};
    renderPage(LOADED_DATA);
  }catch(e){
    console.warn(e);
    redirectLogin();
  }
}

boot();
</script>
